"$schema" = "https://starship.rs/config-schema.json"
format = """
[╭](#777777)\
[▙](bg:#AAAAAA fg:#777777)\
[▚](bg:#AAAAAA fg:white)\
[▘](bg:#AAAAAA fg:white)\
$time\
$battery\
$directory\
$git_branch\
$git_commit\
$git_metrics\
$git_state\
$git_status\
$all\
[](bg:white fg:#AAAAAA)\
[](#AAAAAA)\
$line_break\
[╰─](#777777)\
$os\
$username\
$sudo\
[🭨](bg:#444444 fg:#777777)\
$shell\
$cmd_duration\
$character"""
continuation_prompt = "[∙](bright-black) "
scan_timeout = 30
command_timeout = 10000
add_newline = true
follow_symlinks = true

[palettes]

[profiles]

[aws]
format = '[](bg:#FF9900 fg:white)[on $symbol( $profile)( \($region\))( \[$duration\])]($style)[](bg:#FF9900 fg:white)'
